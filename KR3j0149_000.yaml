  text: 欽定四庫全書子部十
  hash: sha256:6558828ce7672044657017b2bb9c6172233a999f18551baa91b8fd0e67ea1b4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0149_WYG_000-1a, image: WYG0866/WYG0866-0733a.png}
body:
  text: 草木子雜家類三雜説之屬提要臣等謹案草木子四卷明葉子竒撰子竒有太元本㫖已著録考子竒所著諸書有範通元理二卷詩十六卷文二十卷本草醫書節要各十卷齊東野語三卷又餘録若干卷紀元季明初事最詳今惟太元本㫖及此書存此書黄衷序云二十二篇鄭善夫序又云二十八篇正徳丙子其裔孫溥以南京御史出知福州重刻之約為八篇曰管窺曰觀物曰原道曰鉤元曰克謹曰雜志曰談藪曰雜爼每二篇為一卷即此本也善夫序又云舊本今纂為四野語今纂為二併曰草木子則似此四卷已合野語為一書然四卷二卷當為六卷不當為八卷野語今無别本無由質其異同莫之詳也子竒學有淵源故其書自天文地紀人事物理一一分析頗多㣲義其論元代故事亦頗詳核惟賈魯勸托克托開河北水田造至正交鈔求禹河故道功過各不相掩子竒乃竟斥之為邪臣則不若宋濓元史之論為平允也書前有子竒自序題戊午十一月乃洪武十一年即子竒罷巴陵主簿逮繋之嵗此書蓋其獄中所作云乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書草木子目録卷一管窺篇觀物篇卷二原道篇鈎𤣥篇卷三克謹篇雜制篇卷四談藪篇雜俎篇草木子原序洪武戊午春有司以令甲於二月望致祭於城隍神未祭羣吏於後竊飲猪腦酒縣學生發其事吏懼凂衆為之言别生復言於分臬余適至學亦以株連而就逮幽憂於獄恐一旦身先朝露與草木同腐實切悲之因思虞卿以窮愁而著書左丘以失明厥有國語馬遷以腐刑厥有史記是皆因憤難以攄其思志庶幾托空名於天地之間也圄中獨坐閑而無事見有舊籖簿爛碎遂以瓦研墨遇有所得即書之日積月累忽然滿卷然其字畫糢糊畧辨而已及事得釋歸而續成之因號曰草木子萬一後之覽者犧尊而青黄以文之未可知也棄而為溝中之斷亦未可知也容詎必之乎故語才識之髙下理義之淺深雖不敢比倫於數子出於窮愁疾痛而用心則一也千慮一得尚期窮理者擇焉洪武十一年歲次戊午冬十一月二十又七日括蒼龍泉靜齋葉子竒世傑序
