  - {type: page-break, offset: 0, content: '', id: KR3j0149_WYG_004-1a, image: WYG0866/WYG0866-0783a.png}
body:
  text: 草木子卷四明葉子竒撰談藪篇十室之邑必有數家居貨財而無數人能文學何天工輕彼之付而嗇此之施誠以文章學問乃乾坤之清氣也世人類曰德行本也文藝末也德則不務而文藝是輕是何世人之矯枉而過直也蓋文章學問是智德上事亦德也行處是仁德上事亦德也荆南髙士戴如髙曰百家之中不下一二十家有錢粟而無一二人能文章可以見造物取與之輕重矣香之多者色減花之盛者實稀天地於是乎無全功矣唐以詩文取士三百年中能文者不啻千餘家專其美者獨韓栁二人而已栁稍不及止又一韓能詩者亦不啻千餘家專其美者獨李杜二人而已李頗不及止又一杜世之至寶非獨造物所吝惜而亦造物所難成嗚呼悕哉人徒知李杜為詩人而已矣而不知其行之高識之卓也杜甫能知君故陷賊能自拔而從明肅於搶攘之中也李白能知人故陷賊而有赦以能知郭汾陽於卒伍之中也治世以中道高談道德者多失之疏卑談功利者每失之陋文科舉其英武科舉其雄文武並用英雄陳力長世久逺之道也蓋文以程其智網羅收拾所以制治於未亂圖難於其易昧者不知欲舉而廢之豈知所以定天下之機哉觀乎劉靈之於晉高尚之於唐可知矣傳世之盛漢以文晉以字唐以詩宋以理學元之可傳獨北樂府耳宋朝文不如漢字不如晉詩不如唐獨理學之明上接三代元朝文法漢歐陽𤣥𤣥功虞集伯生是也字學晉趙孟俯子昂鮮于樞伯機是也詩學唐楊載仲𢎞虞集是也道學之行則許衡平仲魯齊先生劉因靜齊先生夢吉是也亦皆有所不逮唐之辭不及宋宋之辭勝於唐詩則逺不及也宋朝有詩獄諸儒之過也夫子言詩可以觀可以羣可以怨故言之者無罪聞之者足以戒古人得意句如王荆公青山捫虱坐黃鳥挾書眠黃山谷人得交游是風月天開圖書即江山皆警語也又山谷嘗云杜荀鶴詩舉世盡從愁裏過正好對韓退之詩誰人肯向死前休王荆公亦嘗云杜甫詩當面輸心背面笑可對其結交行翻手為雲覆手雨又溫公云石曼卿對長吉天若有情天亦老之句月如無恨月常圎皆頗中的真西山未第時將㑹試于行在道吾括約友人鄭達道同祈夢於梓潼廟下入謁於神遂擊其鼓題詩於上曰大叩則大應小叩則小鳴我來一扣動天地四海五湖聞其聲是夜得吉夢其年果中賈似道當國時一日退居湖山有一蜀僧徘徊于其側問之曰汝為何僧對曰某詩僧也賈適見湖中有漁翁遂命咏之僧請韻賈以天字為韻僧應口對曰籃裏無魚缺酒錢酒家門外繫漁船幾回欲脫蓑衣當又恐明朝是雨天賈大器之賈似道有異志有一術士能拆字賈以策書地作竒字與之拆術者曰公相之志不諧矣道立又不可道可又立不成公默不語禮而遣之恐泄其事使人害諸途宋樞密文及翁嘗詠一雪辭乃百字令其辭云沒巴沒鼻霎時間做出謾天謾地不問高低并上下平白都教一例鼓弄滕六招邀巽二只恁施威勢識他不破至今道是祥瑞最是鵝鴨池邊三更子夜誤了吳元濟東郭先生都不管挨上門兒穩睡一夜東風三竿紅日萬事隨流水東皇笑道山河元是我底此蓋譏賈相之打量也吕文焕遊潯陽琵琶亭龍麟洲見之吕令賦詩麟洲即席為詩曰老大蛾眉負所天忍將離怨付哀絃夜深正好看秋月却抱琵琶過别船吕見之大慙蓋譏其負宋而降元也宋亡麗水浮雲鄉有栁機察者為冦欲逼栁味道同起攻掠味道誓不為非義用冦怒縊之於松而脅之栁味道占一詩云國破家亦破年窮命亦窮浮雲諸逆賊送我上青松竟死於松下宋㑹稽諸陵多發於楊總統有林景禧唐玊蟾親自收拾遺骨改葬於他處嘗有詩云昭陵玉匣走天涯金粟堆寒幾暮鴉水向蘭亭轉嗚咽不知真帖落誰家又一首云珠亡忽震龍蛇匣軒敝仍忘犬馬情親拾寒瓊出瑶草四山風雨鬼神驚趙仲穆者子昂學士之子宋秀王之後也能作蘭木竹石有道士張伯雨題其墨蘭詩曰滋蘭九畹空多種何似墨池三兩花近日國香零落盡王孫芳草遍天涯仲穆見而愧之遂不作蘭吾括林君度先生家藏穛堂集不知何許人也其語有曰耕堯田者有九年之水耕湯田者有七年之旱耕心田者日日豐年又曰東家富財車馬接踵西家富德風雪滿門又曰畫工數筆術者片言僧道一經一呪動博千金文士刳精嘔血不博人一笑吁士賤何獨在秦哉元世祖皇帝思太祖創業艱難俾取所居之地青草一株置於大內丹墀之前謂之誓儉草蓋欲使後世子孫知勤儉之節至正間大司農達不花公作宫辭十數首其一云墨河萬里金沙漠世祖深思創業難却望䦨干護青草丹墀留與子孫看梁王登寶位時自建康之京都途中嘗作一詩云穿了氁衫便著鞭一鈎殘月栁梢邊兩三㸃露滴如雨六七箇星猶在天犬吠竹籬人過語雞鳴茅店客驚眠須臾捧出扶桑日七十二峯都在前至正壬辰丞相脫脫統兵征南淮兵甫及高郵答麻奏天下亂皆由怨脫脫之故罷脫脫盜自寧息上入其說即軍中貶之脫脫釋兵奉詔赴貶所兵遂大潰大率皆歸紅巾相與為盜賊遂不可復制答麻復矯詔殺之答麻與脫脫初無讎恨但欲謀其相位杜其再來之路爾邪臣謀身悮國遂至於此未幾答麻坐配死或以詩粘國門曰蝦蟇水上浮雪雪見日消定住不開口汪家奴只一朝國事休矣雪雪答麻弟也為御史大夫黨兄為奸定住緘默汪終日酣飲而已靼韃啞御史春日與一瞽者並馬出遊晉陽因戲贈以詩就鞍和袖綰絲韁也逐王孫出晉陽人笑但聞誇景物風來應解審笙簧馬蹄響處無芳草鶯舌調時有緑楊休道不知春色好東風桃李一般香此作不待吟諷亦知其為瞽者之詩也後至元間太師秦王伯顔專權變法謀為不軌貶嶺南道江西死於薦福寺遂殯於是有人以詩弔之曰人臣位極更封王欲逞聰明亂舊章一死有誰為孝子九泉無面見先王輔秦應已如商鞅辭漢終難及子房虎視南人如草芥天教遺臭在南荒蓋其在生出令北人毆打南人不許還報刷馬又欲刷子女天下騷動伯顔丞相與張九元帥席上各作一喜春來辭伯顔云金魚玉帶羅欄扣皂蓋朱幡列五侯山河判斷在俺筆尖頭得意秋分破帝王憂張九辭云金裝寶劍藏龍口玉𢃄紅絨掛虎頭緑楊影裏驟驊騮得志秋名滿鳳凰樓帥才相量各言其志廉訪司官分巡州縣每歲例用巡尉司弓兵旗幟金鼓迎送其音節則二聲鼓一聲鑼起解殺人强盜亦用巡尉司金鼓則用一聲鼓一聲鑼後來風紀之司贓汚狼籍有輕薄子為詩嘲之曰解賊一金并一鼓迎官兩鼓一聲鑼金鼓看來都一樣官人與賊不爭多及元之將亂上下諸司其濫愈甚又有無名子為詩嘲之曰丞相造假鈔舍人做强盜賈魯要開河攪得天下閙於此觀之民風國勢於是乎可知矣浙東僉憲余闕字廷心按吾郡時中秋夜望月嘗作一詩題於分司官舍其詩曰𤣥武夕始正華月升秋旻徘徊出西陸照曜此甌閩金波何穆穆緑枝滿中輪餘波洞軒房紫蘭含微津皇天降豐嵗王政亦已陳樂哉一杯酒允矣同庶人此詩清婉藹然有與民同樂之意後為淮西宣慰守安慶孤城六年上下援絶淮冦益熾城遂陷府前有一大池自刎死於池妻子亦同死贈淮南行省右丞進平章政事諡文貞公其先河西人伊吾兒氏程雪樓為閩守任滿歸民有獻箭旗者以百數公於內取其一聨云閩中有雪方為貴天下無樓如此高曹雪齊有婦人作竹枝歌一首曰美人絶似董妖嬈家住閶門第二橋不肯隨人過江去月明夜夜自吹簫造語頗工宋宫人王昭儀名惠清字沖華丙子北行題驛中有滿江紅辭云太液芙蓉全不似舊時顔色常記春風雨露玊階金闕名播椒蘭妃后裏歡承笑語君王側聽一聲鼙鼓揭天來繁華歇龍虎散風雲滅銅駝恨何堪說對山河百二淚沾襟血驛館夜驚塵土夢宫車曉轉關山月問姮娥垂顧肯相容從圎缺中原士人多誦之但惜末句缺爾處之龍泉縣飛溪季君問妻萬氏守節不再適詠枕上繡梅詩曰灑灑英標别一竒嵗寒心事有誰知妾心正欲同貞白枕上殷勤繡一枝至正乙未青田冦侵浦城西北隅徐嗣元女為所掠嘗作詩曰萬水千山去路賖青鞋踏破幾層沙登山絶頂重逄嶺渡水尤深又復涯鴈字只傳夫與子魚書難寄母和爺回頭遙望鄉關處雲下峰前是我家此詩寫其顛沛流離之狀語意悲切至元十三年冬王師渡江至天台有千戶掠得一王氏婦夫家臨海人婦有美色千戶盡殺其舅姑與夫欲强脅之不可明年春遂驅以北行至嵊縣清風嶺婦乃嚙指出血題詩於石上曰君王無道妾當災棄女拋兒逐馬來夫面不知何日見妾身此去幾時回兩行珠淚頻偷滴一片愁眉鎖不開今夜清風江上月存亡二字苦哀哉寫畢遂投崕而死至今此詩雨中尤可讀至治間官為之立廟以旌之永嘉五峰李孝光為之記元至正間衢州陷龍游有一大家婦何氏為兵所掠裂帛題一詩云妾長朱門十九春豈期今逐虜囚奔失身無補君王事死節難酬夫壻恩江靜從教沈弱質月明誰與吊歸魂只愁父母難相見願與來生作子孫書畢即投於江而死吁誠可尚已至正壬辰紅巾盜起江西吉安敖城曠家婦為盜所得欲妻掠之婦乃先刃其子題詩於壁亦自盡聞者哀之詩曰涇渭能分濁與清妾身豈肯墮風塵孤兒未必從他姓一女何曾侍二人白刃自傷心似鐵黃泉要見骨如銀深山落日猿啼處過客聞之亦慘神嗚呼烈哉紹興路有一女子失其姓氏年及笄欲守志不嫁因秦王伯顔亂法欲刷天下子女其父母不獲已嫁之及定情之夕題一詩於壁上云我年一十有九面貌如花似栁父母逼勒成親只得歡喜忍受自小六根清净如何一夜弄醜洞房花燭休休清風明月皎皎既寫擲筆而逝鄉里異焉近時有一婦人姓張氏不知誰之女也善屬文嘗寄外兄弟一詩曰山之高月出小月之小何皎皎我有所思在逺道一日不見兮我心悄悄採苦採苦於山之南忡忡憂心其何以堪又一首云汝心金石堅我操氷霜潔擬結百嵗盟忽成一朝别朝雲暮雨心去來千里相思共明月二詩美則美矣未免桑間濮上之音爾姚牧菴學士致政於家年八十時夏日沐浴有侍妾在其側公因私焉公起妾前拜曰主公年老賤妾倘有娠家人必見疑願賜識驗公因捉其圍肚題詩於上曰八十年來遇此春此春遇後更無春縱然不得扶持力也作墳前拜掃人公薨後此妾果有子家人疑其外通妾出詩遂解當時士大夫與其子交者皆傳誦以為笑姚公名鏞字希聲虞伯生學士幼年過薊門酒樓題詩於壁曰連十八書其詩曰耳目聰明一丈夫飛行八極隘寰區劍吹白雪妖邪滅袖拂春風朽槁蘇氣集酒酣雙國士情如花擁萬天姝如今一去無消息只有中天月影孤當時皆以為吕洞賓作也爭傳誦之至順辛未間福建廉訪使密蘭沙求仙詩云刀筆相從四十年非非是是萬千千一家富貴千家怨半世功名百世愆牙笏紫袍今已矣芒鞋竹杖任悠然有人問我蓬萊事雲在青山水在天白雲平章求仙於燕京西山頂一日適出滕玉霄訪之不值因戲題於壁曰西風短褐吹黃埃何不從我遊蓬萊振衣長嘯下山去後夜月明騎鶴來竟不留名白雲疑吕仙過之朝野輻凑寵賚山積後知其玊霄題白雲公戒以勿泄厚賂之箕仙所作多有所驗建寧鄭子晉為閩省理問所吏嘗問其功名之事有詩云獨駕扁舟下紫芝三山夜夜夢西歸不須更望長安道花老香山白板扉子晉不逾月而卒龍泉湯良臣赴金陵聘之後豫嘗為其問所除有詩云此君出處底匆匆路入金陵似夢中見說椿花已零落一生事業逐秋風時其父已卒果丁憂歸又胡仲淵正提兵取溫城適問他事其題詩云金甲霜寒十載秋喪師蹙國盡虛謀西風不作封侯夢此老安能正首丘讀者不知其所謂遂詰之曰此贈胡參軍也次年胡移兵取建寧為參政陳友定所擒死於福州徐大山江西人尹處州龍泉縣嘗有一僧獻一楮衾并上以詩曰寒泉瀉出剡溪藤白勝秋霜冷若氷願比一廉清似水梅花紙帳伴孤燈大山見之大喜因與之宴令一婢隔西壁而歌僧聞其曲韻悠揚因窺之乃一老婢天黥滿面醜不可狀因再作一詩云隔壁時聞一曲歌渾疑七寶帳中花瞥然一見翻成恨元出盧同處士家杭州經山寺僧至慧銖積既充復欲還俗乃作一詩曰少年不肯戴儒冠强把身心赴戒壇雪夜孤眠雙足冷霜天剃髮髑髏寒朱樓美酒應無分紅粉家人不許看死去定為惆悵鬼西天依舊黑漫漫松陽縣詩人程渠南滑稽之士也與僧信道元同齊食菌道元請渠南賦菌章詩應聲作四句云頭子光光腳似丁祗宜豆腐與波稜釋迦見了呵呵笑煮殺許多行腳僧聞者絶倒洛陽賈元禮嘗誦一士人詠手詩曰一唾功名在目前豈期摶虎奮空拳文章誤我終投筆志氣凌雲肯執鞭滄海釣魚終有日碧霄攀鳳看他年扶持社稷心中事要與蒼生解倒懸語甚警拔胡仲困在番陽參恩寧普參政軍事時嘗降箕仙問以時事有韓湘子來臨題一詩於灰上曰乾坤清泰慶垂裳底事風塵撼八荒虎豹在關天浩渺豺狼當道日蒼黃孔明有志能全蜀李泌焉能及盛唐堪笑湖山山上客紅塵兩腳為誰忙明首座東南行腳僧也有母八十餘嘗肩擔而行至正間來遊鴈蕩山值母生日以飯一盂經一卷為母之夀而作偈曰今朝是我娘生日剔起佛前長命燈自米自炊還自喫與娘齊得一員僧李黼字子威守江州日妖冦彭和尚攻之城陷死之其姪隨侍不去亦被殺先城未陷時嘗有詩云彌勒何神孕禍胎鼪鼯動地起風埃煙銷郡國民生苦血染江淮鬼物哀人世百年遭此厄天戈萬里幾時來石田也有藍田玉可惜同成一炬灰鬼作晚翠亭詩云一徑入青松飛流淡晴緑道人晚歸來長歌振林谷山深不知求落葉下枯木須臾翠煙開月色照綵服危太朴學士與范德機先生秋夜同步先生得二句云雨止修竹間流螢夜深至喜甚既而曰語太幽殆類鬼作亦近似也元將亡都下有罵玉郎曲極其淫泆之狀豈桑間濮上之風居變風之極也聖上有佳句云鳥啼紅樹裏人在翠微中深得詩趣皇太子作新月詩云昨夜嚴陵失釣鈎何人移上碧雲頭雖然未得團圎相也有清光遍九州真儲君之詩也元朝初朱張二萬户以通海運功上寵之詔賜鈔印令自造行用自是富倍王室及事敗死於京有贈以詩弔之曰禍有胎兮福有基誰人識破這危機酒酣吳地花方笑夢斷燕山草正肥敵國富來猶未足全家破後始知非春風只有門前栁依舊雙雙燕子飛李公紀字仲修號素行齊曰栖白晚年得薦於朝選授應天府治中階奉議大夫曾作詩云五品京官亦美哉腰間銀帶象牙牌有時街上騎驢過人道逰春去不回豫謂不回不若未回字不回字誠恐詩䜟後果然近時有以張巡傳糊忩者有一士人見之而題四句於其右云坐守睢陽當豹關江淮賴此得全安至今青史雖零落猶障忩風一面寒宋末宫中好養鴿太學諸生題之曰萬鴿盤旋繞帝都暮收朝放費工夫何如養取南闕鴈沙漠能傳二聖書昔宋丞相史彌逺薨已久一夕忽有人扣其家門曰丞相歸家人莫不怪之及入門升堂紗燈轎從皆具子婦羅拜畢語話一如平生歷歷分付家事及去索筆書遺囑皆其手跡既而竟去人皆怪之久思不得其理忽一日悟曰乃宋室將亡隂盛陽微之兆也未幾宋果亡元亂之初處州薛氏子年甫弱冠早死一日其家僕上馮公嶺暑甚浴於溪次忽見所亡薛氏子戎衣躍馬𢃄徒而來遙呼其名僕甚訝之語卒囑曰汝歸告老官人我今上帝差我為西帝築建德城遂引徒從而去時國家初得嚴州又杭州士人久已卒忘其名其友於市遇之語戒以勿泄且言當今皆是我輩人汝不信請試看即以袖掩其面潛見滿市皆無頭帶刀傷血淋漉之徒遂贈以錢而别又淮東一人其嫂氏久已死忽一日以事經泰安州見嫂氏配一屠者坐肆上遙相認聚話且留宿食臨别贈以行資一二物皆世所用者雖失記其名字殆與史相之事相類其亦陽微隂盛之兆所以鬼盛與人同也後元亦亡雜俎篇古之聖賢立心至公無我其官人之道必曰祿罔及私官惟其能爵罔及惡德惟其賢此其所以能為天地立心為生民立命也元朝天下長官皆其國人是用至於風紀之司又杜絶不用漢人南人宥密之機又絶不預聞矣其海宇雖在混一之天而肝膽實有胡越之間不過視官爵為已私物其視古聖立賢無方之道果如何哉不知天位天祿天以命有德寧能屯膏吝賞久蔽於漢人南人哉是以不及百年大亂繼踵而爵祿皆歸中原之人蓋禍福乘除其數然也由是觀之人謀豈能奪天造哉孰若均平天施無有南北之分惟才是任惟賢是使譬之水澤使百川分流則大有所瀦小有所泄滔滔汩汩庶為悠久若使壅併防遏蓄而不泄及其潰決小則為災大則致敗必然之理也治天下者不使利遺一孔亦必致敗豈惟名爵獨然末流之竭當窮其源枝葉之枯必在根本元朝末年官貪吏汚始因蒙古色目人罔然不知廉恥之為何物其問人討錢各有名目所屬始參曰拜見錢無事白要曰撒花錢逢節曰追節錢生辰曰生日錢管事而索曰常例錢送迎曰人情錢勾追曰齎發錢論訴曰公事錢覔得錢多曰得手除得州美曰好地分補得職近曰好窠窟漫不知忠君愛民之為何事也元初法度猶明尚有所憚未至於泛濫自秦王伯顔專政臺憲官皆諧價而得往往至數千緡及其分巡競以事勢相漁獵而償其直如唐債帥之比於是有司承風上下賄賂公行如市蕩然無復紀綱矣肅政廉訪司官所至州縣各帶庫子檢鈔稱銀殆同市道矣春秋傳曰國家之敗由官邪也官之失德寵賂章也豈不信夫仕途自木華黎王等四怯薛大根腳出身分任省臺外其餘多是吏員至於科目取士止是萬分之一耳殆不過粉藻太平之具世猶曰無益直可廢也豈時運使然耶何唐宋不侔之甚也元末有危素大朴江西人游京師專以倡鳴科舉無人才為說以聳動觀聽人多信之彼固以文章德行自居也及夷考之至正辛卯天下之亂能死節者惟彭城張桓安慶余闕江州李黻燕京陳子山皆舉人也危是時已纍位至參政獨首鼠皈降上以其失節屢辱之决以夏楚安置滁州而死嗚呼科目雖非古果不足以得人耶豈盡如或人之言也時人監此則可以省已元朝甲寅年開科取士九成殿芝生北人不識字使之為長官或缺正官要題判署事及寫日子七字鈎不從右七轉而從左十轉見者為笑立怯里馬赤蓋譯史也以通華夷言語文字昔世祖嘗問孔子何如人或應之曰是天的怯里馬赤世祖深善之蓋由其所曉以通之深得納約自牖之義俳優戲文始於王魁永嘉人作之識者曰若見永嘉人作相宋當亡及宋將亡乃永嘉陳宜中作相其後元朝南戲尚盛行及當亂北院本特盛南戲遂絶北方自朱邪赤心起於唐季至李克用遂有太原之地至阿保機起於木葉山其勢遂盛其子耶律德光受晉石敬塘關南燕門幽燕十六州之獻遂據之而建國曰大遼其勢與大宋並矣其後金興遂亡遼而逐宋據有天下大半而都汴矣及元朝又亡金而平南宋始混一六合百有餘年而後江南得國蓋自朱邪赤心始盛至於元亡首尾將五百餘年此北朝興衰之一終孟子云五百年必有王者興其間必有名世者此之謂也豈徒然哉達達即韃靼耶律即契丹大金即完顔氏生達達自虎林田地來其性至實無一毫之僞而上天以宇宙畀之而不畀之他部族其故何哉豈不以其極誠而無妄也極誠而無妄聖賢傳心之學也初大元世祖命劉太保築元京城及開基得一巨穴有紅頭蟲不知其幾萬世祖以問劉曰此何祥也劉曰異日亡天下者乃此物也世祖既定天下從容問劉太保曰天下無不敗之家無不亡之國朕之天下後當誰得之劉曰西方之人得之世祖以八思麻帝師有功佐平天下意其類當代有天下思為子孫長久計欲隂損其福而泄其氣於是尊其爵至於一人之下萬民之上豐其養至於東南數十郡之財不足以資之隆其禮至於王公妃主皆拜伏如奴𨽻甚而為授記籍地以髮摩頂以足代馬凳子以脊極其卑賤及其既死復於西方再請一人以襲其位事之一遵其制其所以待之如此者蓋所以虛隆其至貴之禮冀隂消其天下之福以延其國家之命豈知歷數不可以虛邀福祿為彼之妄得改歆為秀徒禍其身豈其然哉世祖生子口啞即裕宗及壯當有室使其游都市使擇其意之所可者為妻獨指一屠人婦世祖即為娶之乃妲吉妃子也腹生二帝都下受戒自妃子以下至大臣妻室時時延帝師堂下戒師於帳中受戒誦呪作法凡受戒時其夫自外歸聞娘子受戒則至房不入妃主之寡者間數日則親自赴堂受戒恣其淫泆名曰大布施又曰以身布施其流風之行中原河北僧皆有妻公然居佛殿兩廡赴齊稱師娘病則於佛前首謝許披袈裟三日殆與常人無異特無髮耳僧之有舍利由其心源澄寂淡然無欲祕耀含靈真積力久氣血精華結而成之也故及其火化炳然獨存聖燈名山之大者往往皆有之世人多歸之佛氏之神如眉縣峨眉山成都聖燈山簡州天光觀衡山聖燈岩匡廬之神燈岩明州天童山高麗之太白山數處聖燈時現蓋山之精英之氣發為光怪爾山發白銀亦有光人跡其光而求多見礦脈一珠之大者光猶照乘况名山為寶藏興焉之所寧獨無光怪焉石韞玉則氣如白虹石生丹砂則光如紅霞皆其光晶之著也前后黃金如王莽末年省中尚有六十餘萬斤後世黃金絶少由其所耗之途廣也金一為箔無復再還元矣玊為寶中至貴且以一身求之天地之理玉則髓也金筋也石骨也水血脈也草木毛髮也土肉也山頭也澤腹也蓋髓為一身元氣所以為至貴也故君子比德於玊行則必珮抑有旨哉人之食性亦有不同者如文王嗜昌歜曾晳嗜羊棗屈倒嗜芰是也其同則膾炙也北人殺小牛自脊上開一孔逐旋取去內頭骨肉外皮皆完揉軟用以盛乳酪酒湩謂之灘脫打捕鷹坊萬戶府嵗用喂養肉三千餘萬斤海東青鶻之至俊者也出於女真在遼國已極重之因是起變而契丹以亡其物善擒天鵝飛放時旋風羊角而上直入雲際能得頭鵝者元朝官裏賞鈔五十錠蒲萄漢張騫使西域中國始有種西瓜元世祖征西域中國始有種剛叔王先生出葡萄二顆各食一顆先生曰千顆如一顆豫曰萬年如今年王則因此而識彼豫則因往而知來或問日生月落古今異乎曰同也雲白山青古今異乎曰同也夏葛冬裘古今異乎曰同也曰天同也地同也人同也人寓形於天壤之間特須臾耳宜流浪大化之中以順其同焉可也飲酒者肝氣微則面青心氣微則面赤脈勇怒則面青骨勇怒則面白血勇怒則面赤山氣多男澤氣多女水氣多喑風氣多聾木氣多傴石氣多力險阻氣多癭暑氣多殘雲氣多夀谷氣多脾丘氣多尫衍氣多仁陵氣多貪匏瓠牛踐苖則子苦蛇怒時毒在頭尾凡冡井間氣秋夏中之殺人先以雞毛投之毛直下無毒回舞而下不可犯當以酒數斗澆之方可入矣蠼􅀈短狐踏影蠱皆中人古人避影為此畫彩佛像鑠目放光或言曾青和壁魚設色則近日有光畫神鬼目隨人轉㸃眸極正則爾北魏崔劭曰鵲巢避風雉去惡政乃是鳥之一長狐性多疑猶性多預可謂獸之一短甲蟲影伏羽蟲體伏食草者多力而愚食肉者勇敢而悍齕吞者八竅而卵生咀嚼者九竅而胎生無角者膏而先前有角者脂而先後食葉者有絲食土者不息食而不飲者蠶飲而不食者蟬不飲不食者蜉蝣蛚屬卻行蜻屬紆行蜻虭屬注鳴蜩屬旁鳴發皇翼鳴蚣蝑股鳴榮原胃鳴蜩三十日而死鱣魚三月上官於孟津鷓鴣向日飛鳳骨黑雌雄夕旦鳴各異其雄聲其雌音雄鳴節節雌鳴足足行鳴曰歸嬉止鳴曰提柣麒麟牡鳴曰逝聖牝鳴曰歸和春鳴曰扶助夏鳴曰養綏鱉無耳為守神虎五指為貙魚二千斤為蛟武陽小魚一斤千頭蛇有水草木土四種孔雀尾端一寸名珠毛鶴左右腳裏第一指名兵爪蜀郡無兔鴿江南無狼馬朱提以南無鳩鵲梟楚鳩所生螺不滋乳瓜瓠子曰犀胡桃仁曰蝦蟇蝦蟆無腸龜腸屬於頭科斗尾脫則足生鳥獸未孕者為禽鳥養子曰乳蛇蟠向王鵲巢背太嵗燕伏戊巳虎奮衡破乾鵲知來猩猩知往鸛影抱蝦蟇聲抱蟬化齊后鳥生杜宇唐鄭復禮言波斯舶土多養鴿鴿能飛行數千里輒放一隻至家以為平安信鸚鵡能言衆鳥趾前三後一惟其四指齊分凡鳥下臉􅀈上獨此鳥兩臉俱動如人目舌亦如人夜行遊女惡鳥也夜飛晝隱如鬼神凡人飴小兒不可露處小兒衣亦不可露晒毛落衣中當落衣中為􅑂或以血㸃其衣為志或言産死所化鬼車鳥相傳昔有十頭能收人魂一首為犬所噬秦中天隂時有聲如力車鳴訓狐惡鳥也鳴則後竅應之獅子尾拂夏月蠅蚋不敢集其上舊說蘇合香獅子糞也象性久識見其子皮必泣牙生埋必因雷聲象膽隨四時在四腿春在前左夏在前右如龜無定體也鼻端有爪可拾針肉有二十般惟鼻是其本肉惡聞大聲耳後有穴薄如鼓皮一刺而斃胸前小橫骨灰之酒服令人能浮水出沒食其肉令人體重象孕五嵗始生虎鬚治齒齒痛拔插齒間即愈虎殺人能令尸起自解衣方食之虎威如乙字長一寸在脅兩傍皮內尾端亦有之佩之臨官佳能役倀鬼解衣馬四嵗兩齒至二十歲齒盡平戎馬八尺田馬七尺駑馬六尺猪槽飼馬石灰泥􅵝汗而繫門三事落駒牛有獨肝者食之殺人相牛法岐胡有夀膺匡欲廣毫筋欲橫蹄後筋也常有聲有黃也角冷有病旋毛在珠泉無夀睫亂觸人銜烏角偏妨主毛少骨多有力溺射前良牛也疏肋難養三嵗二齒四歲四齒五歲六齒六嵗以後每一年接脊骨一節隂虹屬頸隂虹雙筋自尾屬頸也犀之通天者必惡影常飲濁水角之理物似百物犀角通者是其病角有鴆處必有犀也犀三毛一孔狼作聲諸竅皆沸䏶中筋大如鴨卵如織絡小囊蟲所作也狼糞烟直上烽火用之狒狒飲其血可以見鬼力負千斤笑則上吻掩額狀如獼猴作人言如鳥聲能知生死血可染緋髮可為髮鯉脊中鱗一道每鱗有小黑㸃大小皆三十六鱗唐制取得鯉魚即宜放賣者杖六十石班魚好與蛇交鱟雌常負雄而行漁者必得其雙雄者少肉鱟十二足殼可為冠尾可為小如意也玳瑁蟲不再交者虎鴛與玳瑁也鯢魚如鮎四足長尾能上樹天旱輒含水上山如草葉覆身張口鳥來飲水因吸食之聲如小兒峽中人食之先縳於樹鞭之身上白汗出如構汁去此方可食不爾有毒蚌當雷聲則㾭一曰痢蟹腹中有稻芒長寸許八月向東輸與海神未輸不可食菀國出百足蟹長九尺四螯煎為膠謂之螯膠勝風喙膠也􅛔蛑大者長尺餘兩螯至强八月能與虎鬭虎不勝隨大潮退殼一退一長奔䱐一名瀱非魚非鮫色如鮎有兩乳在腹下雌雄隂陽類人頂上有孔通頭氣出嚇嚇作聲必大風相傳懶婦所化殺一頭得膏三四斛取之燒燈照讀書紡績輒暗照歡樂之處則明即江豚也蛤蜊候風雨能以殼為趐飛擁劍一螯極小以大者鬭小者食寄居殼似蝸一頭小蟹一頭螺蛤也寄在殼間常候蝸開出食螺欲合遽入殼中牡蠣言牡非謂雄也介蟲中惟牡蠣是鹹水結成也數丸形似彭蜞競取土各作丸丸數三百而潮至顛當巢深如蚓穴網絲其中土蓋與地平大如榆策常仰扞其蓋伺蠅蠖過輒翻蓋捕之才入復閉與地一色並無絲隟可尋也其形似蜘蛛冷蛇申王有肉疾腹垂至骭𤣥宗詔南方取冷蛇數條賜之蛇長數尺色白不螫人執之冷如握氷申王腹有數約夏月置於約中不復覺煩暑度古似書帶色類蚓長二尺餘首如鏟背上有黑黃欄稍觸則斷常趂蚓蚓不復動乃上蚓掩之良久蚓化惟腹泥如綖有毒雞喫輒死俗呼土蠱蚺蛇其膽上旬近頭中旬在心下旬近尾蝗或言魚子變近之矣食穀為災由部吏侵漁百姓所致蟲身黑頭赤武吏也頭黑身赤儒吏也松今言兩粒五粒粒當言鬛五鬛松皮不鱗松命根遇石則偃蓋不必千年也竹花曰蕧死曰䈙六十年一易根則結實枯死桃枝竹以四尺為一節木瓜一尺一百二十一節木蘭去皮不死荆木心方豆以二七為枎粟纍十二為寸柿俗謂柿樹有七絶一夀二多隂三無鳥巢四無蟲五霜葉可玩六嘉實七落葉肥大赤白柳大者為炭復入灰汁可以煮銅為銀構穀曰久廢必生構葉有瓣曰楮無曰構黃楊木性難長世重黃楊以無火或曰以水試之沈則無火取此木必以隂晦夜無一星則伐之為枕不裂陵霄花中露水損人目胡椒出南海其苖蔓生極柔弱葉長半寸有細條與葉齊條上結子兩兩相向其葉晨開暮合合則褁其子於葉中蓽撥出海南苖長四五尺莖細如筋葉似蕺葉子似桑椹瓦松土木氣泄則生博邪在屋曰昔邪在牆曰垣衣生於久屋之瓦又本草瓦衣謂之屋遊瓜惡香香中尤惡麝一或該之一蒂不實菱四角三角曰芰四角曰菱金燈一名無義草花葉不相見合離根如芋魁有游子十二環之相須而生而實不連以氣相屬一名獨搖一名離母茄欲其子繁待其花時取葉布於過路以灰規之人踐之子必繁也俗謂之嫁茄木中根固柿為最俗謂之柿盤蝦姑狀若蜈蚣管蝦鵝警鵁鶄壓災孔雀辟惡烏賊魚墨汁為書如淡墨有為僞劵以脫人者當知之經年墨消二至前後垂土炭於衡兩端輕重均隂氣至則土重陽氣至則炭重又云政治感低昂猶鐵炭低昂可信也蓋以鐵易土爾古人之節抑有義焉如元旦上已重午七夕重陽皆以竒陽立節偶月則否此亦扶陽抑隂之義也至於元夕以燈花朝以花中秋以月皆以望日此特因其時物之盛者爾蠓飛磑則天風舂則天雨竿影上元竪一丈竿候月午影至七尺大稔九尺一丈有水五尺嵗旱三尺大旱祖宗富貴自詩書中來子孫享富貴則賤詩書矣家業自勤儉中來子孫得家業則忘勤儉矣此所以多衰門也戒之哉貴而忘賤災自驕生迷而不返禍因感起貴驕敗之端也富奢衰之始也甚靳必大費過吝必多亡失乎中道也人生平能懲忿窒欲心氣沖和葷酒不昏情氣不亂故久而血白也諺云寧人負我推而大之忠恕之事也毋我負人守而固之知命之事也忠厚之道也寧我負人毋人負我者反是大抵知是非少計利害者儒人也知利害不計是非者吏人也是非理也利害事也漢末三互法拘忌至姻聮所謂國將亡必多制眚災肆赦怙終賊刑千古赦刑之折衷也殺人者死傷人及盜抵罪千古明刑之折衷也草木子卷四
