body:
  text: 草木子卷三明葉子竒撰克謹篇禹貢曰攻山取銅鐵鑿地數百丈銷隂之精地藏空虛不能含氣出雲水旱之災未有不由此也智襄子為美室士茁曰髙山峻原不生草木松柏之下其土不肥今土木勝臣懼其不安人也室成三年而智氏亡此造室太大之占也必凶伯陽父曰陽伏而不能出隂迫而不能蒸於是有地震是陽失其所而鎮於隂也昔伊洛竭而夏亡河竭而商亡三川竭岐山崩而周亡其國不過十年數之紀也隂變則靜者動陽蔽則明者暗師曠云歲欲豐甘草先生薺也嵗欲苦苦草先生葶藶也嵗欲惡惡草先生水藻也嵗欲旱旱草先生蒺䔧也嵗欲雨雨草先生藕也嵗欲病病草先生艾也嵗欲流流草先生蓬也秦符堅出師武庫刀鎗自鳴遼主天祚親征阿骨打刀鎗皆放光宋童貫出師約夾攻大遼無故忽失二認旗其後兵皆敗衄至正未亂之先江浙大雨忽有二魚落省臺上蓋鱗介失所之象也卒為兵禍在昔晉時亦有是異元劉太保遷元京北城取居庸關水入城冀稍潤其土然亦不及百年禍變亦作豈地數有限而致然耶易曰消息盈虛與時偕行天道也孟子曰天下之生久矣一治一亂人事也管輅曰土地悠長尚有興衰之運地理也由今監古氣化盛衰人事得失未嘗不相因豈徒然哉至正初揚子江一夕忽竭舟楫皆閣於途中露有錢貨無數蓋是纍年覆舟之遺物也人爭取之潮至輒走潮退復然亦有走不及而淹死者如是纍日江復安流識者曰此江嘯也其後果先失江南昔元戊寅年間荆州分域有鬼夜呌云苦也苦幾時泥到襄陽府居人皆聞之而不見其形及早視之凡樹木不論大小皆用泥和狗猪毛離根一二尺泥之至樹分枝處則止後又改呌云苦也苦幾時泥到成都府蓋古今未聞之異也元至正丙戌冬日色如血昔至正六年當天下正升平司天監奏天狗星墜地血食人間五千日始於楚遍及齊趙血食人間五千日終於吳其光不及兩廣其後天下之亂事事皆應丁亥春正既望月夜出無光是時庚申君天久不郊宗廟久不祀蓋已怠荒矣至正戊子永嘉大風海舟吹上平陸髙坡上三二十里死者千數世人謂之海笑其後海寇方國珍據海為盜攻剽瀕海數州朝廷終莫能制至正九年間河內民家養蠶及熟而上箔共結成一幅宛如旗狀又一家蠶數千萬共結成一繭大如數石甕蓋亦倮蟲之孽為兵之兆也鄜州路宜君縣孟皇村呼景賢母舅石氏養蠶三十箔其蠶忽變萬蠶合併為千千化為百百化為十十化為一巨蠶大如瓜瓠及老而簇吐條計重一十五斤當時以為瑞及元末小總兵王保保與慶陽李思齊治兵相攻屠剪其村石氏遂滅蓋倮蟲之孽也又呼家其母養蠶將老蠶忽唧唧有聲次年母卒又張思道出師二百人為一屯野宿刀鎗各作一攢插地夜半鎗忽自然火甚熾須臾煨燼惟金刃存其後兵果散敗是不戢自焚之應也至正己丑冬十一月天裂天漢之傍其後卒因河决聚役徒而叛庚寅年冬溫霹靂暴雨時行衢饒處等州雨黑黍大如小麥色黑咬破視其內白如粉草木皆萌芽吐花雪中雷電自至正至庚寅巳後屢屢見之蓋隂陽差舛之氣異乎常也辛亥春其變輕癸丑春正月十一日雷而大雪者凡三四日又其甚也至正十一年春正月二十日夜京師清寧殿火焚寶玩萬計由宦官熏鼠故也未幾天下大亂淮東賊毛㑹逼都城而退又京師齊化門東街達達一婦人生髭鬚長一尺餘辛卯冬至雷電大雪同至天下遂兵亂人民死者大半又辛卯年嶽州府門忽自倒柱腳向天次年城陷於倪寇壬辰夏四月朔日食既至正壬辰間貶丞相脫脫詔書端明殿忽傾仄如倒狀天兆其戒卒不之悟悲夫元朝之亡蓋决於此壬辰間江淮蘆荻多為旗鎗人馬之狀節間折開有紅暈成天下太平四字雨粉針湖廣民家門戶柱壁之間有粉痕如針樣無數不知何物從何而生至正壬辰癸巳間浙江潮不波其時彭和尚以妖術為亂陷饒信杭徽等州未幾尅復又為張九四所據浙西不復再為元有昔宋末海潮不波而宋亡元末海潮不波而元亡亦天數之一終也蓋杭州是閙潮不閙是其變至正癸巳春三月月食太白是時江淮羣寇起張九四據髙郵韓山童男據臨濠徐貞一倪蠻子陳友諒亂漢沔丞相脫脫統大師四十萬出征聲勢赫然始攻髙郵城未下庚申君入丞相亞麻之讒謂天下怨脫脫貶之可不煩兵而定遂詔散其兵而竄之師遂大潰而為盜有天下之事遂不可復為矣後亞麻慮脫脫再入相矯詔鴆殺之後一年東南州郡多陷其言不驗始杖而貶死癸巳秋大旱溪澗皆渴甲午春大風拔木甲午年春大雨凡八十餘日兩浙大饑是夏赤星見嶽州父老言甲午年大雨群龍皆穴地變化而出者無數識者知其為天發殺機也甲午乙未間河北山東多隕石大或如屋陷深入地丈餘洛陽有大星隕地衮行數十丈草木皆焦北抵山石其土石皆融液而流須臾復望西飛去此又其特異者也至正甲午乙未年龍泉縣人家有一雞二形一邊毛羽純雄一邉毛羽純雌既能雄鳴又解雌伏蓋氣之乖亂羽蟲之孽也次年青田山賊陷縣治至正乙未年三月三日黃霧四塞日暗無光是年六月二十日賊陷縣大掠乙未年中江淮間羣鼠擁集如山尾尾相銜度江過江東來湖廣羣鼠數十萬度洞庭湖望四川而去夜行晝伏路皆成蹊不依人行正道皆遵道側其羸弱者走不及多道斃至正乙未冬湖廣雨黑雪是時倪文俊陷湖廣威順王妃主子女皆為所虜其後諸子皆為所殺陜西省某縣至正十五年間一夜大風雨有一大山西飛者十五里山之舊基積為深潭丁酉夏六月溫州沒千餘家戊戌冬十月有兩日相擊黑光摩蕩至正戊戌冬十二月朔雨雪中東方有赤虹貫於中天處州青田山中竹生米可食至正十九年元京子規啼昔邵康節在洛陽天津橋聞之已知宋室將亂况元京在洛陽北尤逺非南方之鳥所至地氣自南而北又符康節天下將亂之語豈非天數也己亥秋九月晦日天甫明西南方天裂紅光燭地移時始復冬十月白虹貫日己亥冬盛寒之月蜂蝶競出多入人家香爐上立後多凍死按此物當春暖花香則出苦寒出非其時此變也變不虛生宜有其證後龍鳳年間多選良家子弟為湖務間官少年多以事被戮是其應也庚子間太原雨雹大如數斗器牛馬多死是時天下大亂丞相孛羅稱兵犯闕欲廢髙麗氏太子而立雍吉剌所生幼子髙麗后奔滄州太子奔太原王保保舉兵誅孛羅太子復位雍吉刺皇后以憂死幼子雪山其母家取歸直北海都田地至正二十二年間黃河自河東清者千餘里河魚歷歷大小可數庚申帝聞之慘然不樂者數日羣臣奏曰河清王者之瑞胡為不樂耶上曰傳云黃河清聖人生當有代朕者羣臣復曰皇太子生子是陛下聖孫即其應也上笑而釋丙午夏平江路當午天大雷雨有一富家正㕔安置匡床胡椅圓爐臺卓㕔旁一室封鎖如故雷震壁破一孔如盞大其牀椅爐卓皆從此孔入堆疊滿室人皆不解其異次年張九四陷城據有東南五州之地享其富貴十餘年蓋小能容巨賤能居貴之象也至正丁未太原地大震凡四十餘日後又大震裂居民屋宇皆倒壞火從裂地中出燒死者數萬人次年太原陷至正戊申九月庚申帝棄元京遁居應昌府先三日國朝常國公遇春等統兵至栁林去元京甚近庚申帝召文武百官軍民議戰守之計遲明㑹議端明殿及開門忽有二狐自殿上出帝見歎且泣曰宫禁嚴密此物何得至此殆天所以告朕朕其可留哉朕不可復作徽欽銜璧求活為天下笑即命北狩未三日元京遂沒己酉冬十二月朔天裂西南又元京未陷數日前有一餓鴟鳴端明殿上作滅國之聲帝命善射者射之終莫能中庚戌年嶽州府羣蟻同穴無故自鬭而死處處皆積成小堆其後獨嶽州將臣張斌軍師大敗於潞州死庚申帝履位之後月凡食既者三其後卒於其身失國豈夷狄中國之隂也不於日示咎而於月歟庚申帝幼年逺貶南服舟泛清江忽有二老猴登舟獻果而拜及去使人尾之至山洞中羣猴凡四五百上命近寺僧每日設飯飼之及癸酉還都登極羣猴相率拜送餘猴數百皆去忽其中大猴卒死者三十六枚當時皆惘然莫知所以蓋申肖猴迎拜見祥也送死示孽也庚申帝既貶而得國在位凡三十六年而亡國蓋天示之象也在昔唐明皇酉生肖雞明皇好鬭雞兵爭象也其後卒有祿山之亂元朝自世祖混一之後天下治平者六七十年輕刑薄賦兵革罕用生者有養死者有葬行旅萬里宿泊如家誠所謂盛也夫大抵北人性簡直類能傾心以聽於人故世祖既得天下卒賴姚樞牧菴先生許衡魯齊先生諸賢啓沃之力及施治於天下深仁纍澤浹於元元惜乎王以道文統行吏道以雜之以文案牽制雖足以防比人恣肆之姦而真儒之效遂有所窒而不暢矣元京軍國之資久倚海運及失蘇州江浙運不通失湖廣江西運不通元京饑窮人相食遂不能師矣兼之中原連年旱蝗野無遺育人無食脯蝗為糧南陽府廉訪僉事保保巡按至彼忽初更聞雞啼曰此荒雞也不久此地當為丘墟天下其將亂乎遂棄官而隱後南陽果陷蓋初更啼即為荒雞祖逖聞雞聲蹴劉琨起曰此非惡聲也遂起而舞即此事也嘉興府海鹽縣故富家趙君舉及衰替别營一小室以居落成之日宰猪為享禮猪小腸皆修治忽起地如蛇蜿蜒而走將及一里許而止間一年所營小室亦賣家國將亡而妖孽見蓋其理也處州府遂昌縣書忽有大聲如鐘自天而下無形蓋鼓妖也次年縣中官民俱灾遂昌縣徐孟芳母舅見沙洲一石自行自走異之遂拾以歸後碎之實石也他無所有恐至隂生陽之兆也元京未陷先一年當午有紅雲一朵宛然如一西畨塔雖刻畫莫能及凝然至晚方散後帝師以國事不振奔還其國其教遂廢蓋其物象見祥也飾武備以修文德兩盡其道古之教也元朝自平南宋之後太平日久民不知兵將家之子纍世承襲驕奢淫佚自奉而已至於武事略之不講但以飛觴為飛炮酒令為軍令肉陳為軍陳謳歌為凱歌兵政於是不修也久矣及乎天下之變孰能為國爪牙哉此元之所以卒於不振也元初有王華蔡五九等之亂旋致勘定庚申帝初年秦王伯顔為政變亂舊章江西有朱光卿在後有李致甫羅天倫之變國力猶全尋皆殄滅至正戊子間海寇方國珍始為亂先是蔡亂頭剽劫海商始懸格命捕之方為台之楊氏人慕賞功官爵募衆至數千人時台州總管焦鼎等納蔡之賂薄其罪而不加誅玩忽嵗月方遂入海為寇官兵皆不戰而敗朝廷恐為海運之梗招安之即啖之以海運千戶及既定瀕海之民共憤之與萬户蕭載之謀襲殺之不果又叛朝廷命參政孛羅元帥董摶霄率兵加討兵未交皆先潰郝萬户為所獲方拘置舟中使求招安郝故出髙麗后位下請托得行遂特旨釋之進爵已拜參矣嗚呼邉方貪官既失之於始中宫寵后又失之於終當賞而不賞當刑而不刑刑賞之柄既失紀綱於是乎大壞而中原之寇起矣方國珍台之寧海人其居有山在中曰楊氏嘗有童謡云楊氏青出賊精其初亦欲向功為國宣力後失賞遂出忿言曰蔡能為盜我豈不能耶遂叛生平力能走及奔馬與弟國彰國英姪亞初同為亂朝廷屢招國珍為司徒弟姪皆平章院判矣天下治平之時臺省要官皆北人為之漢人南人萬中無一二其得為者不過州縣卑秩蓋亦僅有而絶無者也後有納粟獲功二途富者往往以此求進令之初行尚猶與之及後求之者衆亦絶不與南人在都求仕者北人目為臘雞至以相訾詬蓋臘雞為南方饋北人之物也故云及方寇起瀕海豪傑如蒲圻趙家戴綱司家陳子游等傾家募士為官收捕至兄弟子姪皆殱於盜手卒不沾一命之及屯膏吝賞至於此其大盜一招再招官已至極品矣於是上下解體人不向功甘心為盜矣又獲功之官於法非得風憲體覆牒文不輒命官憲使招權非得數千緡不與行遣故有功無錢者往往事從中輟皆抱怨望其後盜塞寰區空名宣勑遇微功即填給人已不榮之矣嚮使用於初亂之時豈復有寇如此昌熾何其始之嗇而終之濫耶且功則不與賊則與之刑賞倒施何其謬哉嗚呼爵命之設上以尊有德下以待有功此豈人君私器而專用私人也哉後之有天下者可以監矣太史公曰存亡在出令信夫方之初亂有宣數道勑十數道懸以購人立功及有功亦竟不與可為太息昔漢陳豨反代地髙祖即白見千戶者四人以慰趙父老可謂知用天下之機徐州盜韓山童叛先是至正庚寅間參議賈魯以當承平之時無所垂名欲立事功於世首勸脫脫丞相開河北水田務民屯種脫脫從之於大都開田以試之前後所費凡十數萬錠及開西山水閘灌水山水迅暴幾壞都城遂止又勸其造至正交鈔楮幣窳惡用未久輒腐爛不堪倒换遂與至元寶鈔俱澀滯不行物價騰貴及河决南行又勸脫相求夏禹故道開使北流身專其任瀕河起集丁夫二十六萬餘人朝廷所降食錢官吏多不盡支河夫多怨韓山童等因挾詐隂鑿石人止開一眼鐫其背曰莫道石人一隻眼此物一出天下反預當開河道埋之掘者得之遂相為驚詫而謀亂是時天下承平已久法度寬縱人物貧富不均多樂從亂曽不旬月從之者殆數萬人以趙宋為名韓山童詐稱徽宗九世孫僞詔略曰藴玉璽於海東取精兵於日本貧極江南富誇塞北蓋以宋廣王走崖山丞相陳宜中走倭托此說以搖動天下當時貧者從亂如歸朝廷發師誅之雖擒獲而亂階成矣及既定下詔降徐州路為武安州後其黨毛㑹田豐杜遵道等復奉其子為主寇掠汴汝淮泗之間死者成積中原丘墟汝寧盜韓山童男陷汴梁僭稱帝改韓為姓國號宋改元龍鳳分兵攻掠其下有劉太保者每陷一城以人為糧食人既盡復陷一處故其所過赤地千里大抵山東河北山西兩淮悉為殘破毛㑹等兵已犯闕王師極力戰守始退敗蘄州盜徐貞一叛先是瀏陽有彭和尚能為偈頌勸人念彌勒佛號遇夜燃火炬名香念偈拜禮愚民信之其徒遂衆徐本湖南人姿狀龎厚無他長生平以販布為業往來蘄黃間及妖彭衆欲為亂思得其主一日徐於鹽塘水中浴衆見其身上毫光起衆皆驚異遂立為帝反於蘄春天下響應東南遂大亂湖廣江西江浙三省城池多陷沒開蓮臺省於蘄春然資性寬縱權在羣下徒存空名爾後其臣僞漢王陳友諒下兵攻臺謀篡位乃勒死於采石沔陽盜倪文俊號蠻子聚衆從為亂倪世以漁業居黃州黃陂其生之夕母夢有白虎入室遂生及徐僭號倪為僞相用多槳船疾如風晝夜兼行湖江出人不意故多克捷所至殺害虜威順王諸子妻其妃子庚申帝特降詔招撫然亂端已成俱無所及王諸子竟為所殺荆鄂潭嶽黃蘄禮六常德寶慶江䖍洪信等州皆為所據然驕恣不撫其下後竟為其下所殺前夕母復夢白虎死遂遇戮又一二日前有大星落蠻子舟前蠻子曰又有大官人當吾手中死不知乃自己應天象也嗚呼區區一盜使之為亂以禍天下而亦內符母夢上應天象也豈徒然哉其弟倪文郁同亂後封長沙王鎮嶽州及蠻子誅文郁亦見殺獨季弟倪七不從亂亦不及禍至今尚居漢川縣耕稼為業富於牛田汝寧餘寇尚熾丞相脫脫命其弟中臺御史大夫野先不花董師三十萬討之至城下與賊未交鋒即躍馬先遁汝寧守官某執馬不聽其行即拔佩刀欲斫之曰我的不是性命遂逸師遂大潰汝寧不守委積軍資如山率為盜有脫脫匿其敗反以捷聞既而西臺以文彈劾脫脫奏臺憲不許建言違者坐罪此則脫脫欺掩之私也嗟乎命將不於其才惟於其親此其所以敗也昔楊國忠為相任鮮于仲通為將使征雲南喪師一十萬房琯為相用琴士李廷蘭為將使拒安祿山喪師四萬王介甫為相命門客李復圭為將使攻西夏永洛城喪師亦數萬是皆取非才於親昵皆由君不知將將不知兵未有不敗其國者也後之為人君者可不監諸髙郵盜張九四叛至正壬辰年朝廷命脫脫丞相征之中散其兵兵遂潰張乃陷平江盜賊附之如蟻其黨遂剽掠淮汴間朝齊暮趙朝廷不能制張為鹽場網司牙僧以公鹽夾帶私鹽並緣為姦利然資性輕財好施甚得其下之心當時鹽丁苦於官役遂推其為主作亂朝廷命脫脫討之王師號百萬聲勢甚盛衆謂其平在晷刻及抵其城下毛葫蘆軍已有登其城者矣疾其功者曰不得總兵官命令如何輒自先登召其還及再攻之不下未幾下詔貶脫脫師遂潰叛乙未張泛海以數千人陷平江路海運遂絶後朝廷力不能制以詔招之纍官至司徒自號成王據有平江嘉興杭州紹興五路之地其後天下處處盜起陜西有金花娘子江西有歐道人山東有田豐襄陽有莽張嶽州有潑張安慶有雙刀趙四川有旻眼子各據州郡此其大者大抵江淮皆屬淮寇湖廣皆屬徐寇惟此兩枝為盛庚子嵗僞漢王陳友諒殺其君徐貞一稱帝於采石五聖廟先是徐雖為君權皆在倪蠻子友諒其所部也倪為丞相頗驕恣待其下無恩陳因與其黨襲殺之其黨復謀殺之事泄見殺於是大權悉歸於陳封僞漢王欲舉兵收臺兵至采石謀稱帝而後下兵遂遣其黨殺徐僭號曰漢改元大義引兵攻臺大敗而歸營江州為都友諒原沔陽人承平為縣貼書及從為盜弟兄四五人專兵為衛既殺倪殺徐遂謀為帝既敗於建康復棄江州而遁回武昌於是洪䖍吉贑袁瑞撫饒皆歸建康壤地益蹙竭力制舟師謀圖報復合兵攻隆興久不下臺兵至合戰番陽前後相持者八十餘日大戰者五六死者六七萬人兵既不支欲退出至湖口為流矢所中而卒其下復立其子為帝襲位居武昌改元德夀臺兵攻圍一年不拔潑張以潭嶽兵赴援兵敗見執遂俱降國亡重慶盜旻眼子僭號稱帝國號大夏改元旻先沔陽人瞎一目為巡司弓兵牌子頭隨倪蠻子為盜分兵攻四川陷成都殺戮既盡退居重慶陳矯徐命使㑹兵建康既而憤陳之殺逆竟引兵歸曰汝能為帝我豈不能帝耶據有全蜀之地絶不與陳通居位六年後為其弟所殺其妻復圖殺其弟立其子為帝襲位以其黨戴牌為冡宰事皆專之小旻主擁虛名而已辛亥臺兵攻之七月四川破遂同其母俱降其後母召入宫以海舟送小旻主同德夀陳少主去髙麗飄飄然入於海矣元朝是時長淮以北尚皆晏然山東則王信陜西則李思齊隴西則思道太原則王保保汴梁則太子開撫軍司以總之既而諸將積不相能至戊申七月共讒王保保欲叛詔削其軍權九月臺兵北行處處皆望風崩潰曽無一戰王信首以山東降兵竟攻東昌遂搗京師庚申帝遁不三日元京陷直趨山西至澤潞臺兵稍失利遂至太原王保保不支亦遁西指潼關李思齊遁既而妻子被俘亦出降張思道等皆降秦隴悉定頃以皇孫為崇禮侯庚申帝棄元京出居應昌府己酉嵗都督李保保輕兵襲之時庚申帝已於其年四月二十有七日以滯下疾崩皇太子獨脫身走去而皇孫就擒有掌符寶郎以歷代靈草凡四十餘顆降上以其不忠剮之山東降有降將百餘名皆樞密院判之類丞相李善長言其人物魁梧可用上疑其結黨皆殺之辛亥攻四川平之僞夏旻氏母子降天下混一嗚呼治天下之道至公而已爾公則胡越一家私則肝膽楚越此古聖人所以視天下為一家中國為一人也元朝自混一以來大抵皆內北國而外中國內北人而外南人以至深閉固拒曲為防護自以為得親疏之道是以王澤之施少及於南滲漉之恩悉歸於北故貧極江南富稱塞北見於僞詔之所云也迄今天祿之遷盡歸於南於此可以見乘除勝復之理也故自慢藏於方寇誨盜於韓寇奬亂於野先敗事於答麻而天下之勢十已去七八矣於是山東西河南北淮左右皆為冦壤城郭丘墟積骸如山後來雖命李察罕收復河維不幸輕信降寇為田豐之所龍殺其子王保保殺田而代領其衆糧匱師驕不相統一孛羅又生內變稱兵犯闕謀易太子譬之羸病之人日以粥藥扶救猶恐不濟况復以峻導毒劑繼之哉縱無外冦尚且喪亡况臺以百萬之兵振之哉其能淹延數嵗直至戊申而後失國亦云幸矣雜制篇井田之法非獨為均田制祿而已蓋所以隂寓設險守國之意故中原平衍設立許多溝澮許多阡陌使車不得方其軌騎不得騁其足故也豈非寓至險於大順之中者乎觀晉郤克欲使齊人盡東其畝以便戎車吳玠在蜀於天水軍作地綱以阻金兵之騎於此可以驗之也兵法始於黃帝而井田亦始於黃帝八陳圖亦出於井田公田即中軍也私田八家即八陳也歷法斗建天行也建除十二位是也日辰日行也角亢二十八宿是也斗順天而西行日逆天而東轉斗日互行至復㑹於元分之所以為一歲故曰天周嵗終此歷之大綱也歷自上古黃帝以後莫不隨時考驗以與天合故歷法無數更之弊及秦滅先世之術置閏於嵗終古法殫廢矣由漢而下以積年日法為推步之準以至於今夫天運流行而不息欲以一定之法拘之未有久而不差之理差而必改其勢有不得不然者乃命改造儀象日測月驗以與天合庶永終無弊元詔漢太初歷凡十九年七閏為一章章者至朔分齊閏無餘分也二十七章五百一十三嵗為一㑹㑹者日月交㑹一終也凡三㑹八十一章一千五百三十九歲為一統閏朔並無餘分但非甲子嵗首也凡三統二百四十三章四千六百一十七歲為一元至是閏朔並無餘分又值甲子歲首也此揚子雲擬之以作太𤣥也唐太衍歷亦以初年甲子日子時朔旦冬至在嵗次甲子之首謂之至朔同日第二十年為第二章首復得至朔同日然非甲子先之期夜半乃是癸卯日卯時第三十九年至朔同於癸未日午時第五十八年為第四章首至朔復同於癸亥日卯時第七十七年至朔又復同於癸卯日子時因其至朔同在夜半與初年第一章同遂以七十六年名一蔀蔀者蔽暗昧之時也凡四章為一蔀總二十蔀名曰一紀計一千五百二十年必然至朔同於甲子日之先期夜半但非甲子嵗首耳總三紀積四千五百六十年至朔同於甲子之先期夜半又甲子嵗首總㑹如初名曰一元此僧一行推之演大易也歷說雖多不出此一家之術也定歷名曰授時取堯典敬授人時之義自古歷多用一定之法故未久而差由不知天為動物而嵗亦略有差也古歷雖立差法五十年差一度又太過一百年差一度又不及七十五年差一度稍為近之尚未精密元朝以八十一年而差一度算已往減一算算將來加一算始為精密又隨時以儀象歷代立八尺之表以量日景故表短而晷景短尺寸易以差元朝立四丈之表於二丈折中開竅以量日景故表長而晷景長尺寸縱有毫抄之差則少矣元朝立簡儀為員室一間平置地盤二十四位於其下屋背中間開一員竅以漏日光可以不出户而知天運矣銅漏之外又有燈漏沙漏皆竒製也玲瓏儀鏤星象於其體就腹中仰以觀之此出色目人之制也更有五更更有五㸃前後多寡相補其數相齊此可以見古人於小事亦有法也元熊朋來律論黃鍾流行諸律本無間斷也算法之起殆因律琯有長短此算家因律以命術非律以命算也猶之方田焉田生五榖豈知我為圭箕弧環律知五聲豈知我為正變倍半皆算家命之爾故古之鍾律者以耳齊其聲後人不能始假數以正其度雅樂之不可興聲音之不可傳也黍命於律律不命於黍吾於算法亦云又謂空圍九分乃算家內周非空中容九方分律有半吕有倍使有半周倍用變各有倫理凡以羽翼蔡氏之書非求異也諱法自周以前無之至周公立制人生既冠以字易名及有爵者死而定諡則固以彌文矣後世遵之其法愈嚴如始皇名政改正月之正音征至今不改漢吕氏諱雉改雉名野雞人患雉者名野雞疾晉宣帝諱昭改昭穆為招穆至唐李賀父名晉肅謂賀不當舉進士犯其父偏名為諱昌黎韓文公至為作辨諱宋有禮筵名曰大排凡所招親賔則改請其三代名諱筵中倡優雜戲歌曲皆逐一刋定回避然後呈進及入人家皆先問父祖諱然後接談冀無誤犯歷代諱法之嚴如此至於元朝起自漠北風俗渾厚質朴並無所諱君臣往往同名後來雖有諱法之行不過臨文略缺㸃畫而已然亦不甚以為意也初不害其為尊以至士大夫間此禮亦不甚講歷代多崇徽號褒美多至十餘言以上皆後世群臣之導諛也後世人誰誦之初亦何益如堯舜禹湯無諡初不害其為有道之君至周公旦始立諡法諡其父兄為文為武止特一字而已當時諡法之行亦出於公皆考行以定名如幽厲無道加諡以惡雖孝子慈孫百世猶不能改何則以公也及始皇奮其私智一革諡法謂子不可以議父臣不可以議君直以賢聖自居何則實出於私己也漢諡尚少亦死而定名至唐而生加美諡至字最多至為無謂元朝此等皆絶而不為及死而始為之諡亦止於一二字而已初不掩其行之善惡是非此亦可以為法也自周立諡至諸侯卿大夫皆有之歷世遵行乃其常也至元朝秦王太師潛行不軌欲要譽於天下以私錢十萬錠濟怯憐口站戶之乏庚申帝下詔曰有臣如此宜極褒嘉加以美稱凡十四字此又古之大臣所未有也此又殆九錫之漸者乎幸而未幾事敗而隕此則權臣竊命元朝之變例也歷代送終之禮至始皇為甚侈至窮天下之力以崇山墳至傾天下之財以滿藏郭至盡後宫之女以殉埋葬墳土未乾而國丘墟矣其他如漢唐宋陵寢埋殉貨物亦多如漢用即位之年上供錢帛之半其後變亂多遭發掘形體暴露非徒無益蓋有損焉元朝官裏用梡木二片鑿空其中類人形小人合為棺置遺體其中加髹漆畢則以黃金為圈三圈定送至其直北園寢之地深埋之則用萬馬蹴平俟草青方解嚴則已漫同平坡無復考志遺跡豈復有發􅕻暴露之患哉誠曠古所無之典也夫葬以安遺體遺體既安多資以殉何益山呼漢制也自武帝祀嵩嶽始舞蹈唐制也自武后賜宋之問始嘗讀酉陽雜俎書見其記漢禮天子臨朝贊者云天子為宰相起去則臨軒送之御史大夫大將軍三公之官皆然尚猶存此等體貌大臣之禮漢遵秦尊君臣卑之制尚未盡廢後世之待大臣直奴僕爾直牛羊爾三代之時天子當寧而立以朝羣臣未至偃然以臨其下後世益以陵夷也歷代纍封孔子為至聖文宣王元朝加大成二字於其上詔辭略曰先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法所謂祖述百王師表萬世者也文亦精雅蟬冠朱衣漢制也幞頭大袍隋制也今用蟬冠朱衣方心曲領玉珮珠履是革隋而用漢也此則公裳紗帽圎領唐服也仕者用之巾笠襴衫宋服也巾環襈領金服也帽子繫腰元服也方巾圓領明服也庶民用之朝服一品二品用犀玉𢃄大團花紫羅袍三品至五品用金𢃄紫羅袍六品七品用緋袍八品九品用緑袍皆以羅流外授省劄則用檀褐其幞頭皂靴自上至下皆同也官民皆帶帽其簷或員或前員後方或樓子蓋兜鍪之遺制也其髮或辮或打鈔練椎庶民則椎髻衣服貴者用渾金線為納失失或腰線繡通神襴然上下均可服等威不甚辨也繖蓋授宣者用褐羅授勑者用青羅北人華靡之服帽則金其頂襖則線其腰靴則鵝其頂元詔信州路龍虎山三十六代張天師朝京錫以金印封留國公主領江南三山符録道教事真人吳間間為宗師留輦下真人丘長春能燒金佐世祖軍國之用以功封以金印主全真教於其外又有白蓮教滿摩教回回教頭陀教不合不遍各自有宗元太祖起龍朔破大金世祖得襄陽平南宋天下一統取大易大哉乾元之義國號曰大元取至哉坤元之義年號曰至元設經陳紀以垂後世立中書省以總庶務立樞密院以掌兵要立御史臺以糾彈百司世祖嘗言中書朕左手樞密朕右手御史臺是朕醫兩手的此其立臺之旨歷世遵其道不變持國正論謂之臺綱後世漸狥私情謂非親不舉非讎不彈執此之論反謂當然而國論遂大不正矣自庚申帝御極太平王燕帖木兒為相即用其弟買里古思為御史大夫太平既敗繼用秦王伯顔為相即用其兄子脫脫為御史大夫幸脫脫聽其館客吳行可之說發其逆謀秦王貶死遂以功命脫脫為相亦用其弟野先不花為御史大夫及脫脫見貶答麻矯詔鴆之遂以答麻為相即用其弟雪雪為御史大夫當時國事已去矣嗟乎世祖設是官本以防權姦膠固黨與盤結之患使之有所防範擊刺以正國勢及其末世省臺要任乃皆萃於一門殊失養猫捕鼠畜狗防姦之意幸其才智短拙謀不逮心旋致敗滅嚮使莽操懿溫之倫居之元之為元已不逮順帝而後宗社為墟也元中臺建於大都西臺建於陜西南臺建於建康其餘各道設廉訪司𨽻於三臺每嵗巡歷州縣糾察官吏詢民瘼元朝建中臺為御史大夫者自陳緱山始開科為狀元自張起巖始緱山以德業舉起巖以人物舉元朝一品衙門用三臺金印二品三品用兩臺銀印其餘大小衙門印雖大小不同皆用銅其印文皆用八思麻帝師所制蒙古字書惟宣命之寶用玉以玉筯篆文此其異也元之宣勑皆用紙一品至五品為宣色以白六品至九品為勑色以赤雖異乎古之誥勑用織綾亦甚簡古而費約可尚也元君立另設一帳房極金碧之盛名為斡耳朵及崩即架閣起新君立復自作斡耳朵元朝后妃及大臣之正室皆帶姑姑衣大袍其次即帶皮帽姑姑高員二尺許用紅色羅蓋唐金步搖冠之遺制也元朝正后皆用雍吉刺氏自太祖與其族帳設誓同取天下世用其女為后猶契丹有國世用蕭氏為后也自正后之下復立兩宫其稱亦曰二宫皇后三宫皇后三日一輪幸即書宣以召之茍有子則為驗遵大金之遺制也與趙宋之法不同宋後宫無三日之制但遇幸者皆內朝之時則所幸者具禮服謝恩掌宫者即書其姓名他日有子以為驗北人女使必得高麗女孩童家僮必得黑厮不如此謂之不成仕宦元為札刺兒氏太祖與雍吉刺氏同取天下約曰我男長為帝汝女長為后元朝人死致祭曰燒飯其大祭則燒馬元世祖既一天下問劉太保曰今之定都惟上都大都耳兩處何為最佳劉曰上都國祚短民風淳大都國祚長民風淫遂定都燕之計元分天下為十一省二十三道每州皆為路在內為中書省在外為行中書省按歷代疆理天下三代分天下為九州或十二州秦分天下為三十六郡漢分天下為十三部一百六郡晉分天下為十五道唐十道宋分天下為四京三十三路此其大略也元路州縣各立長官曰達魯花赤掌印信以總一府一縣之治判署則用正官在府則總管在縣則縣尹達魯花猶華言荷包上壓口㮏子也亦猶古言總轄之比元各路立萬户府各縣立千戶所以壓鎮各處其所部之軍每嵗第遷口糧府縣關支而各道以宣慰司元帥總之元世祖定天下之刑笞杖徒流絞五等笞杖罪既定曰天饒他一下地饒他一下我饒一下自是合笞五十止笞四十七合杖一百十止杖一百七天下死囚審讞已定亦不加刑皆老死於囹圄自後惟秦王伯顔出天下囚始一加刑故七八十年之中老稚不曽覩斬戮及見一死人頭輒相驚駭可謂勝殘去殺黎元在海涵春育之中矣元惠民有局養濟有院重囚有糧皆仁政也元自世祖以來凡遇天夀聖節天下郡縣立山棚百戲迎引大開宴賀至庚申帝當誕日禁天下屠宰不宴賀慮其多殺以煩民也元世祖定大興府為大都開平府為上都每年四月迤北草青則駕幸上都以避暑頒賜於其宗戎馬亦就水草八月草將枯則駕回大都自后官裏歲以為常車駕雖每嵗往來於兩都間他無巡狩之事山嶽河海惟遣使致祭别無封禪繁縟之禮欲以震耀古今然亦莫掩其盛也元西域胡僧八思麻知緯候佐世祖定天下制蒙古字書以七音為本特定一代之文封為帝師詔尊之曰一人之下萬人之上西方佛子大元帝師卒葬於京其墓上天雨寶花令天下郡國皆立帝師殿其制一同文廟嗚呼謬哉元朝行移文字其正書則自前而後蒙古書則自後而前畏吾兒字則橫書别立譯史樂則郊祀天地祭宗廟祀先聖大朝㑹用雅樂蓋宋徽宗所制大晟樂也曲宴用細樂胡樂駕行前部用胡樂駕前用清樂大樂其部隊遵依金制駕後用馬軍栲栳隊其俗有十六天魔舞蓋以珠瓔盛飾美女十六人為佛菩薩相而舞惟郊天則修大駕而用輦其餘巡行兩都多用氊車散樂則立教坊司掌天下妓樂有駕前承應雜戲飛竿走索踢弄藏􅞢等伎元世祖中統至元間立鈔法以至元寶為母中統交為子子母相推而行中統二貫準至元二伯文一貫準至元一伯文行之四五十年中統以費工本多尋不印行獨至元鈔法通行用以權百貨輕重民甚便之至正間丞相脫脫當承平無事入邪臣賈魯之說欲有所建立以求名於後世别立至正交鈔料既窳惡易敗難以倒换遂澀滯不行及兵亂國用不足多印鈔以賈兵鈔賤物貴無所於授其法遂廢嗚呼蓋嘗考之非其法之不善也由後世變通不得其術也元之鈔法即周漢之質劑唐之錢引宋之交㑹金之交鈔當其盛時皆用鈔以權錢及當衰叔財貨不足止廣造楮幣以為費楮幣不足以權變百貨遂澀而不行職此之由也必也欲立鈔法須使錢貨為之本如鹽之有引茶之有引引至則茶鹽立得使鈔法如此烏有不行之患哉當今變法宜於府縣各立錢庫貯錢若干置鈔準錢引之制如張泳四川行交子之比使富室主之引至錢出引出錢入以錢為母以引為子子母相權以制天下百貨出之於貨輕之時收之於貨重之日權衡輕重與時宜之未有不可行之理也譬之池水所入之溝與所出之溝相等則一池之水動蕩流通而血脈常活也借使所入之溝雖通所出之溝既塞則水死而不動惟有漲滿浸淫而有濫觴之患矣此其理也當時不知徒知嚴刑驅窮民以必行所以刑愈嚴而鈔愈不行此元之所以卒於無術而亡也又如富人糶榖以給批行批得榖其批行矣貧人給批以無榖批乃虛文又何以行之哉元朝止行鈔法而不鑄錢獨至大官裏行至大二等錢當五以蒙古字書小錢以楷書及至正官裏脫脫為相立寶泉提舉司鑄至正錢值世道變尋亦罷鑄參較改正至今百有餘年略無訛舛其法誠為不刋之典元朝至元寶鈔凡十等一拾文為半錢二拾文為一錢叁拾文為一錢半伍拾文為二錢半一伯文為五錢二伯文為一貫叁伯文為一貫五錢伍伯文為二貫五錢一貫為五兩二貫為十兩伍箇一貫為半錠伍箇二貫為錠元世祖立鹽法瀕海州郡立場差官主治差鹽亭戶丁煮鹽至十月結場住煎及額而止鹽商於各省府運司買引就各處鹽場支鹽後鹽積而不售均𣲖戶口收買令其入錢縣官收市其中貧富不等皆令入錢吏胥並緣為姦民甚苦之嗷然皆言其不便事尋罷復令富商收市嘗考歷世鹽法在夏禹時惟止入貢至齊管仲始煮鹽以富國及漢武始立𣙜法為牢盆之制自是歷代皆踵行之計其利於軍國之資略於其半唐宋及元因之有加無瘳大抵率由養兵多而資費廣故不能革也元朝於江西及湖廣立提舉司使之産茶路分賣引照茶以行批驗所驗引無弊即放行至賣處收稅御茶則建寧茶山别造以貢謂之噉山茶山下有泉一穴遇造茶則出造茶畢即竭矣比之宋朝蔡京所製龍鳳團費則約矣民間止用江西末茶各處葉茶元海運自朱瑄張壁始嵗運江淮米三百餘萬石以給元京四五月南風至起運得便風十數日即抵直沽交卸朝廷以二人之功立海運萬戶府以官之賜鈔印聽其自印鈔色比官造加黑印朱加紅富既埒國慮其為變以法誅之而海運自後歲以為常及張九四據有浙西而海道又有方國珍運道遂梗而國已不國矣傳命陸有馬站水有水站州縣凡十里立一鋪大事則遣使馳驛起船馬有劄子小事文書以鋪兵傳送酒法用器燒酒之精液取之名曰哈刺基酒極醲烈其清如水蓋酒露也每歲於冀寧等路造蒲萄酒八月至太行山中辨其真僞真者不氷傾之則流注僞者雜水即氷凌而腹堅矣其久藏者中有一塊雖極寒其餘皆氷而此不氷蓋蒲萄酒之精液也飲之則令人透腋而死二三年宿蒲萄酒飲之有大毒亦令人死此皆元朝之法酒古無有也北人茶飯重開割其所佩小箆刀用鑌鐵定䥫造之價貴於金實為犀利王公貴人皆佩之延席則排卓五蔬五果五按酒置壺瓶臺盞馬盂於别卓於兩楹之間把盞則三跪謂舉盞至尊者前半跪退三步執臺全跪俟尊者飲畢起進前接盞又半跪平交則平禮尊者賜卑者進接盞半跪退三步全跪飲其尊者從人相齊同跪接盞退盞不敢復還尊者湯食非五則七割挈設而散酒行無算挈設蓋茶飯中之體薦也胡語言挈設上賓則用羊背皮馬背皮之類其餘賓用前手後手之類或鵝則用胸於上賓餘賓多寡隨分北方有詐馬筵席最其筵之盛也諸王公貴戚子弟競以衣馬華侈相高豆腐始於漢淮南王劉安之術也飲茶始於唐陸羽著為經也糖霜始於宋自蜀遂寧州人貢宣和始蒲萄酒答刺吉酒自元朝始草木子卷三
