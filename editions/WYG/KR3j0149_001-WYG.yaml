body:
  text: 草木子卷一明葉子竒撰管窺篇天始惟一氣爾莊子所謂溟涬是也計其所先莫先於水水中滓濁歴嵗既久積而成土水土震蕩漸加凝聚水落土出遂成山川故山形有波浪之勢焉於是土之剛者成石而金生焉土之柔者生木而火生焉五行既具廼生萬物萬物化生而變化無窮焉洪範五行之生成以微著為漸次蓋以數言之也水火氣也故微木金形也故著四行莫不待土以生成焉其質最大故居後蓋土所以成始而成終者也南北二極所以定子午之位歴家因二極而立赤道所以定卯酉之位北極瓜之蔕也南極瓜之攢花處也赤道瓜之腰圍也指南針所以通二極之氣也赤道為天之腰圍正當天之濶處黄道自是日行之道月之九道又自月行之道也天度本無廣少之分由渾法分天而有斜長之處始分廣少天如勁風旋轉局大塊於中吾恐日月星辰之上則愈髙愈清愈勁愈光明而無窮矣或人見天裂處見其霞光閃爍於此足以知之矣崑崙天下山之頂也廼天下山之至髙處山之起勢處其東面中原也所以江淮河濟水皆東流也其西面西域諸國也自流沙以西水皆西流也南自吐蕃兩廣水皆南趨也北即沙漠又天下岡脊至髙之處直北虎林至海都木鉢子田地地勢又逐漸而低水皆北流南視隂山之地反為極南之境矣以此觀之地形如一亭子中髙而四方下崑崙乃其結頂處四下之簷乃四方之國土考其流水可見必皆㑹同於四海天以氣言故無窮地以形言故有盡天陽宗故日最盛是以日常員而月則缺也地隂宗故水最盛是以水常滿而火則伏也天主神地主鬼神主伸鬼主屈伸主聚屈主散此二者所以生萬物死萬物之大端也包含徧覆無非天也天包水水承地地載萬物天南為陽北為隂地北為陽南為隂對待之理也山以南為陽北為隂水以北為陽南為隂亦對待之理也天動而無靜亘古亘今無息也地靜而無動亦亘古亘今無息也此天地之道所以為物不貳也及其生物益久莫知其所以然而然也故不測焉空即天也自地而上無非空也即天也地間亦有動時亦氣動之耳天依形地附氣天地自相依附康節之言盡之矣天道不以理言則歸於幻妄耳天之生物匪物物刻而雕之也而世之善雕刻者莫能及此其所以為妙也天地得其位則萬物莫不循其常也一或有失則為灾為妖為亂矣天裂時火光現陽精之極也地裂時泉水溢隂精之盛也天為陽宗故風火在上地為隂統故水土在下地為隂故火隱而不現擊石有火至剛而後生也兩木相摩則火至動而後生也剛動皆陽也有形無聲木石也有聲無形雷霆也有形有聲人物也無形無聲鬼神也冬屬水而一陽巳生於冬夏屬火而一隂巳生於夏此水火之所互根也春木秋金而非隂陽始生之月此金木之所以不互根也金者石中之精液水出石中故曰金生水也素問樞式曰水自西而東流也西金位也故曰金生水亦一説也水生於北方隂位而陽巳生火生於南方陽位而隂巳形故水火互根也木生於陽方陽時金生於隂方隂時而隂陽無所生故金木不互根也火日外光照影在外金水内明照影在内陽施而隂受之理也月亦受光於日而含内影而照物亦影在外者光盛於金水也火陽根隂離中虚也水隂根陽坎中滿也於卦象亦可見也火外明而内暗根隂也水外暗而内明根陽也二物之象亦可見也聖人作八卦以之配五行水火純乎氣者也而無所雜故各以坎離一卦配金木土有隂陽剛柔之質故各以二卦配之乾剛金兊柔金震陽木巽隂木艮髙土坤卑土邵子曰日食月以精月食日以形是以君子用智小人用力此見君臣之理也又曰月受日之光不受日之精相望中弦則光為之食甚矣精之不可以二也竊料太陽乃火之精其氣亦類於人間之火也火正當氣燄之上必有黑暈觀之燈燭可見星家謂之闇虚想即此也受光則稍偏受精則正對以月正對此黑暈之中所以食也月食時辰多天下見之其分數皆同日食時辰少天下見之其分數皆不同由日食月以精其所虧之分其明全盡所以天下皆同也月食日以形其虧之分正當其下則分數同及側逺望之則分數或少或多所以天下多不同也日之食月闇虚之精大故食時辰多月之食日其形小故食時辰小月食隂抗陽而不勝猶可言也日食隂掩陽而勝之不可言也是以春秋書日食而不書月食詩云此月而食則為其常彼日而食於何不臧即取此義列宿所以定經天之體七曜所以布四時之政彗星之生在東則西指在西則東指由其從日生也此其常又有東西偏掃者又其變也太白史或書晝見或書經天蓋巳時當丙位則為經天以其當君禍尤大也其餘方位則止書晝見也康節邵子曰天書夜常見日見於晝月見於夜而半不見星半見而半不見尊卑之等也天為父日為子是以天左旋而日右行也日為夫月為婦是以日東生而月西出也可謂因象而及理矣列星之為象也在朝象官在人象事在野象物各因其變而占焉日月星辰天之四象水火土石地之四象康節言土石而不言木金蓋木乃土之華金乃石之精也是知康節皆以體數言也風雨雲霧雷天之用也吹噴嘘呵呼人之用也天人一理也但有小大之差耳風露能生物亦能殺物順隂陽之氣也風陽也故其氣清通而無形雲隂也故其氣昏濁而可見邵子推雨風露雷而分水火土石曰水雨霖火雨滴土雨濛石雨雹水風温火風熱土風和石風冽水霧黑火霧赤土霧黄石霧白水雷􅀢火雷虩土雷連石雷靂五星在天髙則景小低則景大素問安然雪寒在上故髙山多雪霜寒在下故平地多霜日在地時多故地熱而井水寒也日在地上時少故地寒而井水温也地居天之中地平不當天之半地上天多地下天少是以日出落時見日大近人也日中天時見日小逺人也日初出時見日大宜當熱而尚寒凉者隂凝而陽未勝也日中天時見日小宜寒凉而反漸暖漸熱者陽積盛而隂巳消也申未熱愈於午者陽尤積盛故也廣海冬熱由冬日南行正當戴日之下故熱朔北夏寒夏日雖北行朔北直當隂山之背處日光斜及故寒由此觀之南北寒熱亦由於日也日為衆陽之宗故其暖熱之氣皆出乎日也凉寒則日氣之不及處爾日漸長故暖日極長則熱矣日漸短故凉日極短則寒矣暖則陽氣之盛也而極則斯熱凉則隂氣之盛也而極則斯寒隂脅陽而為雹沴氣也隂凝而未盡勝陽則為霰正氣也是以春秋書雹而不書霰以人事驗之沸湯以器密盛之沈於寒泉則氷此雹之理雪積而日炙之先必為後此霰之理也康節云世有温泉而無凉火蓋隂能從陽陽不能從隂也此説固然乃常理也然北方蕭山亦有凉火也山川之氣積為列星光芒輝焕精之盛也精耗神竭於是乎有隕星星自天横飛而過則為流自下復上則為奔自上而下則為隕星隕精氣竭也川竭水脈絶也山崩地脈絶也當其所主之地則為災海水不潮亦水脈絶也海潮天地之喘息也天有晝夜故潮有朝汐隨月進退從其類也晝長則多熱晝短則多寒寒熱進退皆由於日也月滿則潮盛月虧則潮衰潮汐進退皆由於月也嶺外録江浙之潮自有定候欽㢘之潮則朔望大潮謂之先水日止一潮謂之小水瓊海之潮半月東流半月西流潮之大小隨長短星不係月之盛衰豈不異哉世間特一陽氣之周流爾陽氣不及之處則為隂觀之姤復之理可見斗一南而萬物生一北而萬物死日一北而萬物生一南而萬物死斗日互行而成歲功也斗隨天而左旋故一日而進一度日退天而右轉故一日而不及天一度斗日一周而成一嵗也二十八宿萬古不移所以定天之體而分十二宫也日一月而徧一宫月一月而徧十三宫而復追及於日而成一月也月因日而有晦朔弦望而道疾不由日而由孛也五星却因日而有遲留伏逆日與天㑹為嵗月與日㑹為月日行地盤一位為時至於刻乃歴家自細分之耳每時刻八刻六分刻之二共成一百刻也刻分初正由子午中分天運蓋子初四刻猶屬本日正四刻始作明日筭也由銅漏刻之於籖故有刻之名也歲日與天㑹法也月日與月㑹法也日日與度㑹法也時日與辰㑹法也故時有十二日有三十月有十二嵗有三百六十晦朔弦望皆因於日也晦月與日㑹全無光也朔㑹而復蘇也弦有上下相去四分天之一也望則相對相去四分天之二也每時計九十日每節計四十五日每氣一十五日每候計五日故候有七十二日氣有二十四節有八時有四各為三百六十也氣盈於三百六十五朔虚於三百五十四合氣盈朔盈而閏生焉十九年七閏而氣朔分齊而特餘三時爾是為一章也七十六年為一蔀凡為四章四三一十二合三時之數復得全日一闗十二時為一日一章該二百三十五朔一蔀該九百四十朔故以二百三十五闗為三時以九百四十闗為一日是以合四章而為一蔀故四三一十二而朔亦無餘分也嵗日與天㑹之法也以節氣為定年月與日㑹之法也以朔望為定故年必以元旦嵗則有后先也交於立春時有春夏秋冬風有東西南北是亦風氣一周而成一嵗也然恒風不應而有休廢之氣是則時政之失而廢天常也於是而有風角之占焉嵗差法見天道自古及今日漸不同也歴家但拘常而推所以誤焉隨時修改以與天合元歴得之矣觀物篇天生萬物有色聲香味使無目耳鼻口以收攝之則天地之工或幾於熄矣故色為之目聲為之耳香為之鼻味為之口此天人之所以交也人則得其正者也物則偏焉此其所以靈於萬物也如蠅攻臭穢鴟鴉嗜鼠麋鹿食薦蝍蛆甘𢃄數者孰知天下之正味哉至於義理則惟心可以通之人則可以貫全體物則局於一偏也物之偏者如蜂蟻君臣虎狼父子雎鳩有别豺獺報本是也然人稟其氣之濁且塞者則亦有偏者也惟聖賢則全夫人形之所以生也必資於精氣血三者精之榮以鬚氣之榮以眉血之榮以髮形之所以立也必資於筋骨肉三者骨之餘也齒筋之餘也爪肉之餘也手陽也故指長足隂也故指短上陽下隂人也猿猴四手皆陽也故輕捷而在上猪狗四足皆隂也故奔突而在下邵子曰形統於首神統於目氣統於唇人陽物之靈也故能化火龍隂物之靈也故能化水動物本諸天所以頭順天而呼吸以氣植物本諸地所以根順地而升降以津故動物取氣於天而乗載以地植物取津於地而生養以天善乎素問之言曰出入廢則神機化滅升降廢則氣立孤危無不出入無不升降器有小大數有逺近蓋謂此也動物本諸天而體則温植物本諸地而體則冷隂陽之謂也素問又曰根於内者命曰神機神去則機息根於外者命曰氣立氣止則化滅亦指動植之物而言之啓𤣥子皆以為人血氣之變殊失其旨矣人順生草木倒生禽獸横生大抵草木之性情不如禽獸之性情禽獸之性情不如人之性情大抵人則女麗而艶禽則雄綵而文獸則不甚相較也此造物為之制也歟植物去皮則死氣在外也動物傷内則死神在中也物有貴賤乎曰有也胎生者九竅卯生者八竅是胎生貴於卵生也卵而陸生目能開閉卵而濕生者則不能矣是陸又貴於濕矣化生者非胎非卵隨氣化而成其為物益微矣是濕又貴於化生也此動物有此四種之異也曰植物亦以此而推之可乎曰可也夫草木可挿而活者胎生類也以實而産者卵生類也荷芡濕生也芝菌化生也此植物亦有四種之異也雖然號物之數謂之萬不可勝窮也不分而異不免乎四者之異欲合而同須究其一原之同此學者所當思也鱗䖝皆卵生也獨海鯊胎生故其為魚也最巨佛氏以胎卵濕化四者窮推萬類之生生又以有無色想六者窮推萬類之情識蓋有色是有牝牡之屬鳩鴿是也無色是無雌雄之屬螺􅑕是也若有想是為蠶為蛾時也若無想是為蛹為蟻時也若非有想若非無想此物又極微極細其情識在乎恍惚𣺌茫之間如人身之積䖝似卵白似血片似動非動似生非生之屬是也佛氏論說生類可謂窮深極微矣胎生者眼胞自上而瞑卵生者眼胞自下而暝濕生者眼無胞也常不瞑也故不寐化生者眼無竅惟有黑㸃爾又其微也蛤蚌則無目也益末矣䖝魚之子與草木之子一生即千百者以其為物至微至賤也草木一荄之細一核之微其色香葩葉相傅而生也經千年而不變其根幹有生死其神之傅初未嘗死也傅花接菓當接傅之上則為是花是菓當接傅之下或有斷折及其萌蘖再出則為元花元菓此見造物之主宰處物之氣類萬古不移此主宰所以謂之帝也草木一核之微而色香臭味花實枝葉無不具於一仁之中及其再生一一相肖此造物所以顯諸仁而藏諸用也世謂海棠無香西蜀潼川府路所屬昌州而海棠獨有香故昌州號曰海棠香國州治前有香霏閣每花或二十餘葉香氣醲郁世間萬物無不生䖝木水土之中生䖝至多固其常也至於火中生䖝則火鼠也極南方有之其毛以為火浣布而大南雞亦食火也隂山以北積雪歴世不消其中生蛆其大如瓠北人謂之雪蛆味極甘美張子和醫者著儒門事親書言見民家一鐵鍋底上起一鐵泡鎚破有一紅䖝其走如飛其嘴至硬是金鐵中亦有䖝也邵康節云魚水族也䖝風族也故䖝皆由風化尋常榛栗之類外殻完固而䖝已長於腹中豈是外物遺種當由風化使然江之水族如揚子大江族類各有所限江蠏至潯陽則少鰣魚至鴨欄磯則少麵條魚惟城陵磯冬至前後始有之其理猶鸜鵒不踰濟貉踰淮而死當由地氣使然世間小䖝如一絲半粟之細以至目不可辯而手足頭目動靜食息無不皆具此可以見天命之流行無一之或遺無微之不入喘蝡之䖝多蛾生也翹蛸之物多水䖝生也蟲風族也魚水族也介䖝石之族也是以螺蠣多附於石從其類也甲䖝木之族也螢腐草生也車羊腐木生也皆食於草木而附於草木亦從其類也林棲之羽似葉草宿之毛似草亦從其類也蝤蠐蚯蚓土族也故土居而土食礜石蠶食之則肥鼠食之則死氣感各異也鱗䖝有蟄龍蛇是也羽䖝有蟄鶯燕是也毛䖝有蟄黄鼠是也介䖝有蟄龜鱉是也夫蟄物又造物減其半功也故其用不能全石决明海中大螺也生於南海崖石之上海人泅水取之乗其不知用手一撈則得茍其覺知雖用斧鑿亦不脱矣南海中秋有月則蚌胎生珠無月則否也雉善聽狼善視狐善疑駱駞善知泉象善知地虚實澣布以灰濯錦以魚洗金以鹽馬蹄圓為陽牛蹄拆為隂馬之卧也起則自前足牛之卧也起則自後足隂鳥之飛也頭縮而足伸陽鳥之飛也頭伸而足縮牛雖有耳而聽以鼻龜雖有鼻而息以耳邵子曰陸生之物水中必具猶形之於影也巨於陸者水中必細細於陸者水中必巨今試推之魚飛鳥類也鳥翼長魚鬐短鳥尾長魚尾短鳥頭小魚頭大餘倣此推之龍蝘蜓類也蠏蜘蛛類也蝦蠶類也石虱􅂒類也石蠶蠶類也龜鱉甲䖝類也螺螄胎生類也鼉蜮走類也蛙黽倮䖝類也計必有海人甞聞海賈云南海時有海人出形如僧人頗小登舟而坐至則戒舟人寂然不動少頃復沈水否則大風翻舟又大金時有龍見燕京舊塘濼手托一嬰兒如少年中官狀紅袍玉𢃄略無畏怖之容經三時始没由此觀之水亦有人類也但幽明相隔不可相知耳觀温太真牛渚燃犀事理亦可見疥有䖝予嘗使明視者針而得之其大不能以半粟也詳細察之有觜黝然有足纎然有背隆然善止善行且蹤且横嘗竊計其為䖝也人之膚革完全也必非外物能遺之種因人氣血之不和乃化而生焉及其既生也能好也能畏也能就也能避也能饑也能飽也能動也能靜也能佚也能勞也能吸也能嘘也八竅之具神機之用未始有一之不足者焉未始有一之不能者焉於此可以觀性命之理矣於此可以觀造化之妙矣雖然是其形也有大小也是其理有大小乎世必有能辯之者魚有骨在内者有骨在外者有多骨者有少骨者有無者萬不同也然其所同者蓋水也草木之葉有大者有小者有長者有短者有厚者有薄者有圓者有匾者有尖者有䰄者有花鏤者亦萬不同也然其所同者均含生意也茲可以求萬物之一原者乎鷹鸇能摶鴐鴈而反受逐於鶺鴿非其力不及也智不及也崖鶻能摶鶬鷺而不能得飛鴿非其飛不能及也不能頡頏也由此觀之物皆以智相制不獨以力也物有相資以生者璅蛣腹蟹也物有相待以動者水母目蝦也凡物得氣之盛者必有異於物龍之異以骨故能吸氣精龜之異以殻故可卜而先知犀之異以角故孕星蚌之異以珠故胎月麝之異以臍故香可通闗鹿之異以角又獨皮褁而可補食獺之異以肝故月生葉而可祛瘵猩猩之異以血故可染物而不渝又能知徃也玳瑁之異以甲故可器鯊魚胎生也其異以皮故可鞘麟角鳳觜也其異以膠可以續斷弦以至象以牙翠以羽魚以魫是皆有異於物而得氣之盛者也故聖人之生也得五行秀中之至秀者焉其必有異於人也歟有物命一物一命也有國命萬民一命也一物一命物之自生自死是也萬民一命屠城坑卒是也此説聞之莆陽鄭先生厚云或問之草木子曰物固有知乎曰有之知乎知不知乎不知曰物固有能乎曰有之能乎能不能乎不能曰物固有知而不能能而不知者乎曰有之瞽者無以與乎文章之觀固嘗知文章矣痿者無以與乎康莊之途固嘗知康莊矣曰固有知而不可得而知能而不可得而能者乎曰有之也且之知也之能也知者不自能知也有知知能者不自能能也有能能蓋語不能顯黙不能藏可以意授不可以言𫝊也水魚不瞑土䖝不息鴈順隂陽而南北魚順隂陽而上下鶯燕虵蛙順隂陽而出入鰷浮水面鮠沈水底鯽游水中有雌而無雄其名大腰龜鱉是也有雄而無雌其名細腰蜂蠆是也物性可齊乎曰不可也曰何也子獨不見乎物有直行者狗馬是也有曲行者虵蚓是也有横行者郭索是也有却行者夔踵考也有兩頭行者率然是也有屈伸行者尺蠖是也有動其脅腹縮縮循行者􅀈蝡之蟲是也是固然矣聞以有翼飛者矣得非鷹鸇乎聞以有翼而不飛者矣得非鴨鵞乎未聞以無翼飛者焉然亦有之龍與螣虵是也是其形既異不能不與之變豈非形動而天隨者乎之諸蟲也又何知夫物之植者有然乎曰有之有有葉有枝者松柏是也有有葉無枝者荷芡是也有無葉有枝者木賊是也有無葉無枝者豨苓茯苓馬勃是也不獨此也固亦有有花有實者有如桃李乎亦有有花無實者有如菊萱乎亦有無花無實者有如蕨薇乎然則豈無有實而無花者焉固有其物也且此物也可以衣被生靈有大功於天下獨與羣物異也而人莫得而知之蚤􅂒至微也天地生之以食人人至靈也天地生之以食萬物雖然人能食物又能理物故可與天地參焉中冷泉錫器盛之則漏是水之至精者也昆吾之刀可以切玊是金之至精者也沈香遇水即沈是木之至精者也金剛鑽可以鑽石是石之至精者也故物之至精者必有異乎物以此推之物之精者水有金有木有石有物既皆有之人獨無乎哉人之精也者聖人也鶴糞可以化石成塵龜尿可以和墨寫字入石蟾酥可以潤玊可割是皆氣物之相感制飛之至髙者鶴也鵠也天鵝也鷹鸇也餘皆下風也萬物既生如是形矣其為技也有不待教而後能且鳥也百舌合百舌而成一舌故善變聲啄木舌端有棘針故善取蠧鸚鵡舌似人故能言一受其成形故不待教而後能妙矣哉造物之生羣動也隨大隨小無不各自取足焉無所待於外也是故夔一足也人兩足也馬四足也蜘蛛六足也螃蠏八足也蝍蛆四十足也蚿百足也帶無足也無者不資於多而後行多者不見其多而反遲於行動其天機不言而喻多者不見其為有少者不見其為無故曰惟䖝能䖝惟䖝能天轎人馬也鋤人牛也舟人魚也牛觝角馬蹄齧天也絡馬首穿牛鼻人而天也莊子盡歸之人非也莊子曰百昌皆生於土皆歸於土此土者所以始萬物而終萬物者也觀物者所以玩心於其物之意也是故於草木觀生於魚觀自得於雲觀閑於山觀靜於水觀無息草木子卷一
